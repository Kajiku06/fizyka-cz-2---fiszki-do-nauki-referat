<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiszki Fizyka - Bezpieczna Wersja</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg-front: #1e293b;
            --card-bg-back: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --border-color: #334155;
            --variable-color: #f472b6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 5px;
            font-size: 2.2rem;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background-color: #334155;
            color: white;
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        button:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            font-weight: bold;
        }

        .progress {
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .flashcard-container {
            width: 100%;
            max-width: 700px;
            height: 540px;
            perspective: 1000px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s ease;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--border-color);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }

        .card-front {
            background-color: var(--card-bg-front);
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .card-back {
            background-color: var(--card-bg-back);
            transform: rotateY(180deg);
            justify-content: flex-start;
        }

        .id-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: #334155;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #cbd5e1;
            font-weight: 600;
        }

        .topic-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(56, 189, 248, 0.15);
            color: var(--accent-color);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .question-text {
            font-size: 1.6rem;
            font-weight: 600;
            line-height: 1.4;
            margin: 0 10px;
        }

        .formula-display {
            font-size: 1.8rem;
            background: rgba(15, 23, 42, 0.6);
            padding: 18px;
            border-radius: 12px;
            margin: 10px 0 20px 0;
            border-left: 5px solid var(--accent-color);
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
            line-height: 2;
        }

        .variables-list {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .variables-list h4 {
            margin: 0 0 12px 0;
            color: var(--accent-color);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .variable-item {
            margin-bottom: 10px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #e2e8f0;
        }

        .variable-symbol {
            color: var(--variable-color);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .hint-click {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .fraction {
            display: inline-block;
            vertical-align: middle;
            text-align: center;
            padding: 0 4px;
        }
        .fraction > span {
            display: block;
            padding-top: 2px;
        }
        .fraction span.numerator {
            border-bottom: 2px solid var(--text-color);
            padding-bottom: 2px;
        }
        .fraction span.denominator {
            padding-top: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Fiszki z Fizyki</h1>
        <div class="subtitle">Wzory, Definicje, Zmienne i Równania Materiałowe</div>
    </header>

    <div class="progress" id="progressTracker">Ładowanie...</div>

    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="card">
            <div class="card-face card-front">
                <span class="id-badge" id="cardId">#1</span>
                <span class="topic-badge" id="cardTopic">Temat</span>
                <div class="question-text" id="cardQuestion">Pytanie</div>
                <div class="hint-click">Kliknij, aby odkryć odpowiedź</div>
            </div>
            <div class="card-face card-back" onclick="event.stopPropagation();">
                <span class="id-badge" id="cardIdBack">#1</span>
                <div class="formula-display" id="cardFormula"></div>
                <div class="variables-list">
                    <h4>Objaśnienie zmiennych i stałych:</h4>
                    <div id="cardVariables"></div>
                </div>
                <div class="hint-click" style="color: #64748b;" onclick="flipCard()">Kliknij tło karty, aby obrócić</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard()">Poprzednia</button>
        <button onclick="shuffleCards()">Losuj kolejność</button>
        <button onclick="nextCard()">Następna</button>
    </div>

    <script>
        const flashcardsData = [
            {
                id: "1a",
                topic: "Równanie drgań",
                question: "Równanie drgań wymuszonych oraz częstość rezonansowa",
                formula: '<div class="fraction"><span class="numerator">d<sup>2</sup>x</span><span class="denominator">dt<sup>2</sup></span></div> + 2&beta;<div class="fraction"><span class="numerator">dx</span><span class="denominator">dt</span></div> + &omega;<sub>o</sub><sup>2</sup>x = P cos(&Omega;t)<br><br>&omega;<sub>r</sub> = &radic;(&omega;<sub>o</sub><sup>2</sup> - 2&beta;<sup>2</sup>)',
                variables: [
                    { symbol: "x", desc: "wychylenie układu z położenia równowagi w funkcji czasu t" },
                    { symbol: "t", desc: "czas" },
                    { symbol: "d<sup>2</sup>x / dt<sup>2</sup>", desc: "druga pochodna wychylenia po czasie (przyspieszenie układu)" },
                    { symbol: "dx / dt", desc: "pierwsza pochodna ruchu po czasie (prędkość układu)" },
                    { symbol: "&beta; (beta)", desc: "współczynnik tłumienia ośrodka" },
                    { symbol: "&omega;<sub>o</sub>", desc: "częstość kołowa drgań własnych" },
                    { symbol: "P", desc: "amplituda siły wymuszającej" },
                    { symbol: "&Omega; (omega wielka)", desc: "częstość kołowa siły wymuszającej zewnętrzne drgania" },
                    { symbol: "&omega;<sub>r</sub>", desc: "częstość rezonansowa układu" }
                ]
            },
            {
                id: "1b",
                topic: "Równanie drgań",
                question: "Równanie drgań tłumionych i jego rozwiązanie",
                formula: '<div class="fraction"><span class="numerator">d<sup>2</sup>x</span><span class="denominator">dt<sup>2</sup></span></div> + 2&beta;<div class="fraction"><span class="numerator">dx</span><span class="denominator">dt</span></div> + &omega;<sub>o</sub><sup>2</sup>x = 0<br><br>x = x<sub>o</sub>e<sup>-&beta;t</sup>cos(&omega;t + &phi;), gdzie &omega; = &radic;(&omega;<sub>o</sub><sup>2</sup> - &beta;<sup>2</sup>)',
                variables: [
                    { symbol: "x", desc: "chwilowe wychylenie z położenia równowagi" },
                    { symbol: "x<sub>o</sub>", desc: "amplituda początkowa drgań" },
                    { symbol: "e", desc: "podstawa logarytmu naturalnego" },
                    { symbol: "&beta;", desc: "współczynnik tłumienia" },
                    { symbol: "&omega;", desc: "częstość drgań tłumionych" },
                    { symbol: "&phi; (phi)", desc: "faza początkowa drgań" }
                ]
            },
            {
                id: "2",
                topic: "Wahadła",
                question: "Okres drgań wahadła fizycznego",
                formula: 'T = 2&pi; &radic;<div class="fraction"><span class="numerator">J</span><span class="denominator">mgl</span></div>',
                variables: [
                    { symbol: "T", desc: "okres drgań wahadła" },
                    { symbol: "J", desc: "moment bezwładności bryły względem osi obrotu" },
                    { symbol: "m", desc: "masa całkowita bryły" },
                    { symbol: "g", desc: "przyspieszenie ziemskie" },
                    { symbol: "l", desc: "odległość od osi obrotu do środka masy bryły" }
                ]
            },
            {
                id: "4",
                topic: "Elektrostatyka",
                question: "Siła Coulomba (Oddziaływanie ładunków)",
                formula: 'F = k <div class="fraction"><span class="numerator">q<sub>1</sub>q<sub>2</sub></span><span class="denominator">r<sup>2</sup></span></div>',
                variables: [
                    { symbol: "F", desc: "wartość siły wzajemnego oddziaływania ładunków" },
                    { symbol: "k", desc: "stała elektrostatyczna ośrodka" },
                    { symbol: "q<sub>1</sub>, q<sub>2</sub>", desc: "wartości ładunków punktowych" },
                    { symbol: "r", desc: "odległość pomiędzy ładunkami" }
                ]
            },
            {
                id: "5",
                topic: "Elektrostatyka",
                question: "Natężenie pola elektrycznego ładunku punktowego",
                formula: 'E = k <div class="fraction"><span class="numerator">Q</span><span class="denominator">r<sup>2</sup></span></div>',
                variables: [
                    { symbol: "E", desc: "natężenie pola elektrycznego" },
                    { symbol: "Q", desc: "ładunek będący źródłem pola" },
                    { symbol: "r", desc: "odległość od ładunku źródłowego" }
                ]
            },
            {
                id: "9",
                topic: "Elektrostatyka",
                question: "Równanie Poissona",
                formula: '&Delta;V = - <div class="fraction"><span class="numerator">1</span><span class="denominator">&epsilon;<sub>o</sub></span></div> &rho;',
                variables: [
                    { symbol: "&Delta; (laplasjan)", desc: "operator różniczkowy Laplace'a" },
                    { symbol: "V", desc: "potencjał elektryczny" },
                    { symbol: "&epsilon;<sub>o</sub>", desc: "przenikalność elektryczna próżni" },
                    { symbol: "&rho; (rho)", desc: "objętościowa gęstość ładunku" }
                ]
            },
            {
                id: "21",
                topic: "Pole Magnetyczne",
                question: "Siła Lorentza",
                formula: 'F<sub>L</sub> = q (v &times; B)',
                variables: [
                    { symbol: "F<sub>L</sub>", desc: "siła działająca na ładunek w polu magnetycznym" },
                    { symbol: "q", desc: "wartość ładunku elektrycznego" },
                    { symbol: "v", desc: "prędkość cząstki" },
                    { symbol: "B", desc: "indukcja magnetyczna pola" },
                    { symbol: "&times;", desc: "symbol iloczynu wektorowego" }
                ]
            },
            {
                id: "24",
                topic: "Równania Maxwella",
                question: "Równania Maxwella w postaci różniczkowej",
                formula: 'div D = &rho;<br>div B = 0<br>rot H = j + <div class="fraction"><span class="numerator">&part;D</span><span class="denominator">&part;t</span></div><br>rot E = - <div class="fraction"><span class="numerator">&part;B</span><span class="denominator">&part;t</span></div>',
                variables: [
                    { symbol: "div", desc: "dywergencja (źródłowość pola)" },
                    { symbol: "rot", desc: "rotacja (wirowość pola)" },
                    { symbol: "D / E", desc: "indukcja elektryczna / natężenie pola elektrycznego" },
                    { symbol: "B / H", desc: "indukcja magnetyczna / natężenie pola magnetycznego" },
                    { symbol: "&rho;", desc: "gęstość ładunku" },
                    { symbol: "j", desc: "gęstość prądu przewodzenia" }
                ]
            }
        ];

        let currentIndex = 0;

        function updateCard() {
            const card = flashcardsData[currentIndex];
            document.getElementById('card').classList.remove('flipped');
            
            setTimeout(() => {
                document.getElementById('cardId').innerText = "#" + card.id;
                document.getElementById('cardTopic').innerText = card.topic;
                document.getElementById('cardQuestion').innerText = card.question;

                document.getElementById('cardIdBack').innerText = "#" + card.id;
                document.getElementById('cardFormula').innerHTML = card.formula;

                const varContainer = document.getElementById('cardVariables');
                varContainer.innerHTML = '';
                card.variables.forEach(v => {
                    const item = document.createElement('div');
                    item.className = 'variable-item';
                    item.innerHTML = `<span class="variable-symbol">${v.symbol}</span> &mdash; ${v.desc}`;
                    varContainer.appendChild(item);
                });

                document.getElementById('progressTracker').innerText = `Fiszka: ${currentIndex + 1} / ${flashcardsData.length}`;
            }, 100);
        }

        function flipCard() {
            document.getElementById('card').classList.toggle('flipped');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % flashcardsData.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + flashcardsData.length) % flashcardsData.length;
            updateCard();
        }

        function shuffleCards() {
            for (let i = flashcardsData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [flashcardsData[i], flashcardsData[j]] = [flashcardsData[j], flashcardsData[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        window.onload = () => {
            updateCard();
        };
    </script>
</body>
</html>
