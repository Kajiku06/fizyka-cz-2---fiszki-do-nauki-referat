<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiszki Fizyka - Pełna Baza 28 Kart</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg-front: #1e293b;
            --card-bg-back: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --border-color: #334155;
            --variable-color: #f472b6;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--accent-color); margin: 0 0 5px 0; font-size: 2rem; }
        .subtitle { color: #94a3b8; font-size: 0.95rem; }
        .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        button {
            background-color: #334155; color: white; border: 1px solid var(--border-color);
            padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 500;
        }
        button:hover { background-color: var(--accent-color); color: var(--bg-color); }
        .progress { margin-bottom: 15px; font-size: 1.05rem; color: #94a3b8; font-weight: bold; }
        .flashcard-container { width: 100%; max-width: 680px; height: 480px; perspective: 1000px; cursor: pointer; }
        .flashcard { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s ease; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 16px; padding: 25px; box-sizing: border-box; display: flex;
            flex-direction: column; border: 2px solid var(--border-color); overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .card-front { background-color: var(--card-bg-front); justify-content: center; align-items: center; text-align: center; }
        .card-back { background-color: var(--card-bg-back); transform: rotateY(180deg); justify-content: flex-start; }
        .id-badge { position: absolute; top: 15px; left: 15px; background-color: #334155; padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .topic-badge { position: absolute; top: 15px; right: 15px; background-color: rgba(56, 189, 248, 0.12); color: var(--accent-color); padding: 3px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .question-text { font-size: 1.45rem; font-weight: bold; line-height: 1.4; padding: 0 10px; }
        .formula-display { font-size: 1.55rem; background: rgba(15, 23, 42, 0.55); padding: 14px; border-radius: 12px; margin: 15px 0; border-left: 5px solid var(--accent-color); text-align: center; line-height: 1.8; }
        .variables-list { border-top: 1px solid var(--border-color); padding-top: 12px; }
        .variables-list h4 { margin: 0 0 8px 0; color: var(--accent-color); font-size: 1rem; text-transform: uppercase; }
        .variable-item { margin-bottom: 6px; font-size: 0.92rem; line-height: 1.4; }
        .variable-symbol { color: var(--variable-color); font-weight: bold; }
        .hint-click { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .fraction { display: inline-block; vertical-align: middle; text-align: center; padding: 0 4px; font-size: 0.95em; }
        .fraction span.numerator { display: block; border-bottom: 2px solid var(--text-color); padding-bottom: 1px; }
        .fraction span.denominator { display: block; padding-top: 1px; }
        .vector { display: inline-block; position: relative; }
        .vector::after { content: "→"; position: absolute; top: -11px; left: 50%; transform: translateX(-50%); font-size: 0.65rem; }
    </style>
</head>
<body>

    <header>
        <h1>Fiszki: Fizyka 1 cz. 2</h1>
        <div class="subtitle">Pełna baza danych — Dokładnie 28 interaktywnych kart naukowej powtórki</div>
    </header>

    <div class="progress" id="progressTracker">Ładowanie zestawu...</div>

    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="card">
            <div class="card-face card-front">
                <span class="id-badge" id="cardId">#1</span>
                <span class="topic-badge" id="cardTopic">Temat</span>
                <div class="question-text" id="cardQuestion">Pytanie</div>
                <div class="hint-click">Kliknij kartę, aby zobaczyć odpowiedź</div>
            </div>
            <div class="card-face card-back" onclick="event.stopPropagation();">
                <span class="id-badge" id="cardIdBack">#1</span>
                <div class="formula-display" id="cardFormula">Wzór</div>
                <div class="variables-list">
                    <h4>Informacje z materiałów:</h4>
                    <div id="cardVariables">Zmienne</div>
                </div>
                <div class="hint-click" style="color: #64748b;" onclick="flipCard()">Kliknij szare tło, aby obrócić z powrotem</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard()">Poprzednia</button>
        <button onclick="shuffleCards()">Losuj kolejność</button>
        <button onclick="nextCard()">Następna</button>
    </div>

    <script>
        const flashcardsData = [
            {
                id: "1",
                topic: "Równanie drgań",
                question: "Równanie różniczkowe drgań wymuszonych",
                formula: '<div class="fraction"><span class="numerator">d<sup>2</sup>x</span><span class="denominator">dt<sup>2</sup></span></div> + 2&beta;<div class="fraction"><span class="numerator">dx</span><span class="denominator">dt</span></div> + &omega;<sub>o</sub><sup>2</sup>x = P cos(&Omega;t)',
                variables: [
                    { symbol: "x", desc: "wychylenie układu z położenia równowagi" },

                    { symbol: "&beta; (beta)", desc: "współczynnik tłumienia" },
                    { symbol: "&omega;<sub>o</sub>", desc: "częstość kołowa drgań własnych" },
                    { symbol: "P", desc: "amplituda siły wymuszającej" },
                    { symbol: "&Omega; (omega)", desc: "częstość kołowa zewnętrznej siły wymuszającej" }
                ]
            },
            {
                id: "2",
                topic: "Równanie drgań",
                question: "Częstość rezonansowa w drganiach wymuszonych",
                formula: '&omega;<sub>r</sub> = &radic;(&omega;<sub>o</sub><sup>2</sup> - 2&beta;<sup>2</sup>)',
                variables: [
                    { symbol: "&omega;<sub>r</sub>", desc: "częstość rezonansowa układu (częstość siły wymuszającej, przy której amplituda osiąga maksimum)" },
                    { symbol: "&omega;<sub>o</sub>", desc: "częstość kołowa drgań własnych" },

            {

            {

                variables: [
                    { symbol: "Budowa domenowa", desc: "Kryształy z budową domenową wytwarzające silny wypadkowy moment magnetyczny." },
                    { symbol: "Histereza", desc: "Krzywa magnesowania posiada kształt pętli histerezy." },
                    { symbol: "Temperatura Curie", desc: "Temperatura graniczna, powyżej której ferromagnetyki stają się paramagnetykami." }
                ]
            },
            {
                id: "26",
                topic: "Pole Magnetyczne",
                question: "Siła Lorentza i Prawo Biota-Savarta",
                formula: '<span class="vector">F</span><sub>L</sub> = q (<span class="vector">v</span> &times; <span class="vector">B</span>)<br><br>d<span class="vector">B</span> = <div class="fraction"><span class="numerator">&mu;<sub>o</sub>&mu;<sub>r</sub></span><span class="denominator">4&pi;</span></div> <div class="fraction"><span class="numerator">I (d<span class="vector">L</span> &times; <span class="vector">r</span>)</span><span class="denominator">r<sup>3</sup></span></div>',
                variables: [
                    { symbol: "<span class=\"vector\">F</span><sub>L</sub>", desc: "wektor siły Lorentza działającej na ładunek q poruszający się z prędkością v" },
                    { symbol: "d<span class=\"vector\">B</span>", desc: "elementarny wektor indukcji magnetycznej od odcinka dL przewodnika z prądem I" },
                    { symbol: "&times;", desc: "iloczyn wektorowy" }
                ]
            },
            {
                id: "27",
                topic: "Równania Maxwella",
                question: "Równania Maxwella w postaci całkowej oraz równania materiałowe",
                formula: '&oint;<sub>S</sub> <span class="vector">D</span>&middot;d<span class="vector">S</span> = &int; &rho;dV \quad &oint;<sub>S</sub> <span class="vector">B</span>&middot;d<span class="vector">S</span> = 0<br>&oint;<sub>C</sub> <span class="vector">H</span>&middot;d<span class="vector">l</span> = &int;<sub>S</sub> (<span class="vector">j</span> + <div class="fraction"><span class="numerator">&part;<span class="vector">D</span></span><span class="denominator">&part;t</span></div>)&middot;d<span class="vector">S</span><br>&oint;<sub>C</sub> <span class="vector">E</span>&middot;d<span class="vector">l</span> = - &int;<sub>S</sub> <div class="fraction"><span class="numerator">&part;<span class="vector">B</span></span><span class="denominator">&part;t</span></div>&middot;d<span class="vector">S</span><br>Materiałowe: <span class="vector">D</span> = &epsilon;<sub>o</sub>&epsilon;<sub>r</sub><span class="vector">E</span> ,  <span class="vector">B</span> = &mu;<sub>o</sub>&mu;<sub>r</sub><span class="vector">H</span>',
                variables: [
                    { symbol: "I i II", desc: "Prawo Gaussa dla pola elektrycznego (źródłowe) oraz magnetycznego (bezźródłowe)" },
                    { symbol: "III i IV", desc: "Uogólnione prawo Ampera (prąd przesunięcia) oraz Prawo indukcji Faradaya" }
                ]
            },
            {
                id: "28",
                topic: "Równania Maxwella",
                question: "Równania Maxwella w postaci różniczkowej",
                formula: 'div D = &rho;<br>div B = 0<br>rot H = j + <div class="fraction"><span class="numerator">&part;D</span><span class="denominator">&part;t</span></div><br>rot E = - <div class="fraction"><span class="numerator">&part;B</span><span class="denominator">&part;t</span></div>',
                variables: [
                    { symbol: "div D / div B", desc: "dywergencja (źródłowość) indukcji elektrycznej (równa gęstości ładunku &rho;) oraz magnetycznej (zawsze zero)" },
                    { symbol: "rot H / rot E", desc: "rotacja (wirowość) pól zależna od gęstości prądu j oraz zmian strumieni w czasie (&part;/&part;t)" }
                ]
            }
        ];

        let currentIndex = 0;

        function updateCard() {
            const card = flashcardsData[currentIndex];
            document.getElementById('card').classList.remove('flipped');
            
            setTimeout(() => {
                document.getElementById('cardId').innerText = "#" + card.id;
                document.getElementById('cardTopic').innerText = card.topic;
                document.getElementById('cardQuestion').innerText = card.question;
                document.getElementById('cardIdBack').innerText = "#" + card.id;
                document.getElementById('cardFormula').innerHTML = card.formula;

                const varContainer = document.getElementById('cardVariables');
                varContainer.innerHTML = '';
                card.variables.forEach(v => {
                    const item = document.createElement('div');
                    item.className = 'variable-item';
                    item.innerHTML = `<span class="variable-symbol">${v.symbol}</span> &mdash; ${v.desc}`;
                    varContainer.appendChild(item);
                });

                document.getElementById('progressTracker').innerText = `Karta: ${currentIndex + 1} z ${flashcardsData.length}`;
            }, 100);
        }

        function flipCard() { document.getElementById('card').classList.toggle('flipped'); }
        function nextCard() { currentIndex = (currentIndex + 1) % flashcardsData.length; updateCard(); }
        function prevCard() { currentIndex = (currentIndex - 1 + flashcardsData.length) % flashcardsData.length; updateCard(); }
        function shuffleCards() {
            for (let i = flashcardsData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [flashcardsData[i], flashcardsData[j]] = [flashcardsData[j], flashcardsData[i]];
            }
            currentIndex = 0; updateCard();
        }
        window.onload = () => { updateCard(); };
    </script>
</body>
</html>
